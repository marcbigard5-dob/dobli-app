name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgmp-dev
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Download Compatible Android NDK (r25c)
        run: |
          cd /home/runner
          wget https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=/home/runner/android-ndk-r25c" >> $GITHUB_ENV

      - name: Build APK with Buildozer
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_NDK_HOME: /home/runner/android-ndk-r25c
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

      - name: Upload Generated APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dobli-App-Debug-APK
          path: bin/*.apk
