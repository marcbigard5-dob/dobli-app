name: CI
on:
  push:
    branches: [ principal ]
  pull_request:
    branches: [ principal ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Code de récupération avec sous-modules
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'recursive'

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances système
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Installez Buildozer et Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Générez un APK avec Buildozer
        run: |
          yes | buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
          BUILD_NUMBER: ${{ github.run_number }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

      - name: Téléverser un fichier APK
        uses: actions/upload-artifact@v4
        with:
          name: application-Kivy
          path: bin/*.apk
          
