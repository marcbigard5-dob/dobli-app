name: Build Android APK
on:
  push:
    branches: [ principal, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses-dev libtinfo6 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "cython<3.0.0" buildozer

      - name: Auto-correct buildozer.spec config
        run: |
          if [ -f buildozer.spec ]; then
            # إجبار متطلبات بايثون القياسية المتوافقة مع البيئة الحالية لمنع كسر الأنبوب
            sed -i 's/^requirements =.*/requirements = python3,kivy/' buildozer.spec
            # تفعيل قبول رخص الـ SDK تلقائياً داخل الإعدادات
            sed -i 's/^# android.accept_sdk_license =.*/android.accept_sdk_license = False/' buildozer.spec
          fi

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: '1'
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-apk
          path: bin/*.apk
