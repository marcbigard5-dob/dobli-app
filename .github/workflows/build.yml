name: Build Android APK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch: # هذا السطر يتيح لك تشغيل البناء بضغطة زر دون الحاجة لتغيير الكود

jobs:
  build:
    runs-on: ubuntu-20.04 # استخدام نسخة مستقرة جداً من أوبونتو

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9' # إصدار بايثون الأكثر استقراراً مع Kivy و Buildozer

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev cmake libffi-dev libgmp-dev
        pip install --upgrade pip setuptools wheel
        pip install "cython<3.0.0" buildozer

    - name: Build with Buildozer
      run: |
        export BUILDOZER_WARN_ON_ROOT=0
        # إجبار قبول التراخيص وحل مشكلات الـ NDK تلقائياً
        yes | buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Dobli-App-Package
        path: bin/*.apk
