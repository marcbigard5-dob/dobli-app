name: Build Android APK

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------
      # Python 3.9
      # -----------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # -----------------------------
      # Java 17
      # -----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -----------------------------
      # Linux dependencies
      # -----------------------------
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache \
            git \
            python3-pip

      # -----------------------------
      # Android SDK
      # -----------------------------
      - name: Install Android SDK
        run: |

          mkdir -p $HOME/android-sdk/cmdline-tools

          cd $HOME

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip -q commandlinetools-linux-11076708_latest.zip

          mkdir -p $HOME/android-sdk/cmdline-tools/latest

          mv cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

          export PATH=$PATH:$HOME/android-sdk/cmdline-tools/latest/bin

          yes | sdkmanager --licenses || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # -----------------------------
      # Android NDK r25b
      # -----------------------------
      - name: Install Android NDK
        run: |

          cd $HOME

          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip

          unzip -q android-ndk-r25b-linux.zip

          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r25b" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk-r25b" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk-r25b" >> $GITHUB_ENV

      # -----------------------------
      # Buildozer
      # -----------------------------
      - name: Install Buildozer
        run: |

          python -m pip install --upgrade pip

          pip install cython==0.29.33

          pip install buildozer==1.5.0

      # -----------------------------
      # Buildozer Spec
      # -----------------------------
      - name: Create buildozer.spec
        run: |

          cat > buildozer.spec <<EOF
          [app]

          title = Dobl App

          package.name = dobli
          package.domain = com.marcbigard5

          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas

          version = 0.1

          requirements = python3,kivy==2.1.0,cython==0.29.33,plyer,requests,certifi

          orientation = portrait

          fullscreen = 0

          android.api = 33
          android.minapi = 21
          android.ndk = 25b
          android.ndk_api = 21

          android.archs = arm64-v8a, armeabi-v7a

          android.permissions = INTERNET

          p4a.branch = master

          [buildozer]

          log_level = 2
          warn_on_root = 1
          EOF

      # -----------------------------
      # Build APK
      # -----------------------------
      - name: Build APK
        run: |

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          export ANDROID_NDK_HOME=$HOME/android-ndk-r25b
          export ANDROID_NDK_ROOT=$HOME/android-ndk-r25b
          export ANDROID_NDK=$HOME/android-ndk-r25b

          rm -rf .buildozer
          rm -rf ~/.buildozer

          buildozer android debug

      # -----------------------------
      # Upload APK
      # -----------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: application-apk
          path: bin/*.apk
