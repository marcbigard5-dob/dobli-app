name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y zip unzip curl openjdk-17-jdk
        pip install --upgrade pip buildozer cython

    - name: Configure Buildozer
      run: |
        buildozer init
        # إصلاح buildozer.spec مباشرة من هنا
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/g' buildozer.spec
        sed -i 's/# android.api = 33/android.api = 33/g' buildozer.spec
        sed -i 's/# android.minapi = 24/android.minapi = 24/g' buildozer.spec
        sed -i 's/# android.sdk = 20/android.sdk = 33/g' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25c/g' buildozer.spec

    - name: Build APK
      run: |
        # تنظيف أي ملفات سابقة
        rm -rf .buildozer bin
        # بناء التطبيق
        buildozer -v android debug
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: Dobli-App
        path: bin/*.apk
