name: Build Android APK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libtinfo6 cmake libffi-dev libssl-dev

      - name: Install Cython and Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer

      - name: Configure buildozer.spec
        run: |
          # إنشاء ملف الإعدادات إذا لم يكن موجوداً
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi
          
          # تحديث الإعدادات
          sed -i 's/^requirements =.*/requirements = python3==3.10.0,kivy==2.2.1,cython==0.29.33,pyjnius==1.5.0,plyer,certifi,requests/' buildozer.spec
          sed -i 's/^android.accept_sdk_license =.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^android.ndk =.*/android.ndk = 23b/' buildozer.spec
          sed -i 's/^android.sdk =.*/android.sdk = 30/' buildozer.spec
          sed -i 's/^android.api =.*/android.api = 30/' buildozer.spec
          sed -i 's/^android.minapi =.*/android.minapi = 21/' buildozer.spec
          
          # منع تكرار --ndk-api
          sed -i '/^android.ndk_api/d' buildozer.spec
          echo "android.ndk_api = 21" >> buildozer.spec
          
          echo "=== buildozer.spec بعد التعديل ==="
          cat buildozer.spec

      - name: Build APK (بدون yes command)
        run: |
          # تعيين متغيرات البيئة يدوياً
          export ANDROID_ACCEPT_SDK_LICENSE=yes
          export P4A_IGNORE_MINSDK_NDK_API_MISMATCH=1
          
          # استخدام echo بدلاً من yes لتجنب Broken pipe
          echo y | buildozer -v android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: application-apk
          path: bin/*.apk
          if-no-files-found: warn
