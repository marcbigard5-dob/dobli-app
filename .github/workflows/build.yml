name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Python
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # =========================
      # Java 17
      # =========================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # =========================
      # System dependencies
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses-dev \
          libffi-dev \
          libssl-dev \
          cmake \
          git \
          wget \
          tar

      # =========================
      # Install Android SDK
      # =========================
      - name: Install Android SDK
        run: |

          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip commandlinetools-linux-11076708_latest.zip

          mv cmdline-tools $HOME/android-sdk/cmdline-tools/latest

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

          # حل مشكلة licenses
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

          yes | sdkmanager --sdk_root=$ANDROID_HOME --licenses || true

          sdkmanager --sdk_root=$ANDROID_HOME \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          # التحقق من AIDL
          find $ANDROID_HOME -name aidl

      # =========================
      # Install Android NDK r23b
      # =========================
      - name: Install Android NDK
        run: |

          mkdir -p $HOME/android-ndk
          cd $HOME/android-ndk

          wget https://dl.google.com/android/repository/android-ndk-r23b-linux.zip

          unzip android-ndk-r23b-linux.zip

          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV

      # =========================
      # Install Buildozer
      # =========================
      - name: Install Buildozer
        run: |

          python -m pip install --upgrade pip

          pip install cython==0.29.33

          pip install buildozer==1.5.0

      # =========================
      # Create buildozer.spec
      # =========================
      - name: Create buildozer.spec
        run: |

          cat > buildozer.spec <<EOF
          [app]

          title = Dobli
          package.name = dobli
          package.domain = com.marcbigard5

          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas

          version = 0.1

          requirements = python3,kivy==2.2.1,cython==0.29.33,pyjnius==1.5.0,plyer,requests,certifi

          orientation = portrait
          fullscreen = 0

          android.api = 34
          android.minapi = 21
          android.ndk = 23b
          android.ndk_api = 21

          android.archs = arm64-v8a, armeabi-v7a

          android.accept_sdk_license = True

          android.permissions = INTERNET

          [buildozer]

          log_level = 2
          warn_on_root = 1
          EOF

      # =========================
      # Build APK
      # =========================
      - name: Build APK
        run: |

          export PATH=$PATH:$HOME/.local/bin

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          export ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r23b
          export ANDROID_NDK_ROOT=$HOME/android-ndk/android-ndk-r23b
          export ANDROID_NDK=$HOME/android-ndk/android-ndk-r23b

          export P4A_IGNORE_MINSDK_NDK_API_MISMATCH=1

          # تنظيف الملفات القديمة
          rm -rf .buildozer
          rm -rf bin

          buildozer android debug

      # =========================
      # Upload APK
      # =========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
