name: Build Android APK

on:
  push:
    branches:
      - main
      - principal

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      # -----------------------------------
      # Checkout
      # -----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------
      # Python
      # -----------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # -----------------------------------
      # Java 17
      # -----------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -----------------------------------
      # System dependencies
      # -----------------------------------
      - name: Install system dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses-dev \
            libtinfo6 \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache \
            liblzma-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev

      # -----------------------------------
      # Android SDK
      # -----------------------------------
      - name: Install Android SDK
        run: |

          mkdir -p $HOME/android-sdk/cmdline-tools

          cd $HOME

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip -q commandlinetools-linux-11076708_latest.zip

          mkdir -p $HOME/android-sdk/cmdline-tools/latest

          mv cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          export PATH=$PATH:$ANDROID_HOME/platform-tools

          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

          java -version

          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --version

          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      # -----------------------------------
      # Android NDK
      # -----------------------------------
      - name: Install Android NDK r23b
        run: |

          mkdir -p $HOME/android-ndk

          cd /tmp

          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip

          unzip -q android-ndk-r23b-linux.zip

          mv android-ndk-r23b $HOME/android-ndk/

          echo "ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk/android-ndk-r23b" >> $GITHUB_ENV

      # -----------------------------------
      # Install Buildozer (نسخة مستقرة)
      # -----------------------------------
      - name: Install Buildozer
        run: |

          python -m pip install --upgrade pip

          pip install cython==0.29.33

          pip install buildozer==1.5.0

      # -----------------------------------
      # Create buildozer.spec
      # -----------------------------------
      - name: Create buildozer.spec
        run: |

          cat > buildozer.spec <<EOF
          [app]

          title = Dobl App

          package.name = dobli
          package.domain = com.marcbigard5

          source.dir = .
          source.include_exts = py,png,jpg,kv,atlas

          version = 0.1

          requirements = python3,kivy==2.2.1,cython==0.29.33,pyjnius==1.5.0,plyer,certifi,requests

          orientation = portrait

          fullscreen = 0

          android.accept_sdk_license = True

          android.api = 34
          android.minapi = 21
          android.sdk = 34

          android.ndk = 23b
          android.ndk_api = 21

          android.archs = arm64-v8a, armeabi-v7a

          android.permissions = INTERNET

          android.allow_backup = True

          p4a.branch = master

          [buildozer]

          log_level = 2
          warn_on_root = 1
          EOF

      # -----------------------------------
      # Build APK
      # -----------------------------------
      - name: Build APK
        run: |

          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk

          export ANDROID_NDK_HOME=$HOME/android-ndk/android-ndk-r23b
          export ANDROID_NDK_ROOT=$HOME/android-ndk/android-ndk-r23b
          export ANDROID_NDK=$HOME/android-ndk/android-ndk-r23b

          export P4A_IGNORE_MINSDK_NDK_API_MISMATCH=1

          rm -rf .buildozer
          rm -rf ~/.buildozer

          buildozer android debug

      # -----------------------------------
      # Upload APK
      # -----------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: application-apk
          path: bin/*.apk
          if-no-files-found: error
