name: Build Android APK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libtinfo6 cmake libffi-dev libssl-dev

      # --- القسم المهم: تثبيت Android SDK وأداة AIDL يدوياً ---
      - name: Install Android SDK and AIDL
        run: |
          # تحميل Android SDK Command-line Tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          
          # تعيين متغيرات البيئة
          echo "$GITHUB_WORKSPACE/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$GITHUB_WORKSPACE/android-sdk" >> $GITHUB_ENV
          
          # قبول التراخيص (تتم بشكل صامت)
          yes | sdkmanager --licenses > /dev/null 2>&1
          
          # تثبيت build-tools بالإصدار 34.0.0 (يحتوي على AIDL)
          sdkmanager "build-tools;34.0.0" > /dev/null
          
          # التحقق من وجود AIDL (سيعرض المسار إذا نجح)
          find $ANDROID_HOME -name "aidl" -type f
      # ---------------------------------------------------------

      - name: Force NDK 23b
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk/27.3.13750724
          sudo rm -rf /usr/local/lib/android/sdk/ndk/29.0.14206865
          sudo mkdir -p /usr/local/lib/android/sdk/ndk/
          cd /tmp
          wget -q https://dl.google.com/android/repository/android-ndk-r23b-linux.zip
          unzip -q android-ndk-r23b-linux.zip
          sudo mv android-ndk-r23b /usr/local/lib/android/sdk/ndk/
          echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk/android-ndk-r23b" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/android-ndk-r23b" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/android-ndk-r23b" >> $GITHUB_ENV

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install Cython==0.29.33
          pip install buildozer

      - name: Create buildozer.spec
        run: |
          echo '[app]' > buildozer.spec
          echo 'title = Dobl App' >> buildozer.spec
          echo 'package.name = dobli' >> buildozer.spec
          echo 'package.domain = com.marcbigard5' >> buildozer.spec
          echo 'source.dir = .' >> buildozer.spec
          echo 'source.include_exts = py,png,jpg,kv,atlas' >> buildozer.spec
          echo 'version = 0.1' >> buildozer.spec
          echo 'requirements = python3==3.10.0,kivy==2.2.1,cython==0.29.33,pyjnius==1.5.0,plyer,certifi,requests' >> buildozer.spec
          echo 'orientation = portrait' >> buildozer.spec
          echo 'osx.python_version = 3' >> buildozer.spec
          echo 'osx.kivy_version = 2.2.1' >> buildozer.spec
          echo 'fullscreen = 0' >> buildozer.spec
          echo '' >> buildozer.spec
          echo '[buildozer]' >> buildozer.spec
          echo 'log_level = 2' >> buildozer.spec
          echo 'warn_on_root = 1' >> buildozer.spec
          echo '' >> buildozer.spec
          echo 'android.accept_sdk_license = True' >> buildozer.spec
          echo 'android.ndk = 23b' >> buildozer.spec
          echo 'android.sdk = 30' >> buildozer.spec
          echo 'android.api = 30' >> buildozer.spec
          echo 'android.minapi = 21' >> buildozer.spec
          echo 'android.ndk_api = 21' >> buildozer.spec
          echo 'android.archs = arm64-v8a, armeabi-v7a' >> buildozer.spec
          echo 'android.allow_backup = True' >> buildozer.spec
          echo 'android.permissions = INTERNET' >> buildozer.spec

      - name: Build APK
        run: |
          export ANDROID_NDK=/usr/local/lib/android/sdk/ndk/android-ndk-r23b
          export ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/android-ndk-r23b
          export ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/android-ndk-r23b
          export ANDROID_SDK_ROOT=$GITHUB_WORKSPACE/android-sdk
          export ANDROID_HOME=$GITHUB_WORKSPACE/android-sdk
          export ANDROID_ACCEPT_SDK_LICENSE=yes
          export P4A_IGNORE_MINSDK_NDK_API_MISMATCH=1
          rm -rf .buildozer
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: application-apk
          path: bin/*.apk
          if-no-files-found: warn
